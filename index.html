<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Issue Viewer | JIRA EPMS</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-card: #111827;
    --bg-card-hover: #1a2332;
    --border: #1e2d3d;
    --border-active: #3b82f6;
    --text-primary: #e2e8f0;
    --text-secondary: #7a8ba3;
    --text-muted: #4a5568;
    --accent: #3b82f6;
    --accent-glow: rgba(59, 130, 246, 0.15);
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'IBM Plex Sans', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
    pointer-events: none;
  }

  .app { position: relative; z-index: 1; }

  /* --- HEADER --- */
  .header {
    padding: 2rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(59, 130, 246, 0.05) 0%, transparent 100%);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }

  .header-badge {
    font-family: var(--mono);
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-glow);
    padding: 0.25rem 0.6rem;
    border-radius: 3px;
    border: 1px solid rgba(59, 130, 246, 0.2);
  }

  .header h1 {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }

  .header h1 span { color: var(--accent); }

  .header-sub {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-top: 0.25rem;
  }

  /* --- TOOLBAR --- */
  .toolbar {
    padding: 1rem 2rem;
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: rgba(17, 24, 39, 0.6);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 0.55rem 0.75rem 0.55rem 2.2rem;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-family: var(--mono);
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent); }

  .search-box::before {
    content: '⌕';
    position: absolute;
    left: 0.7rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .btn {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 0.55rem 0.9rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover {
    background: var(--bg-card-hover);
    color: var(--text-primary);
    border-color: var(--text-muted);
  }

  .btn.active {
    background: var(--accent-glow);
    color: var(--accent);
    border-color: var(--accent);
  }

  .btn-accent {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn-accent:hover {
    background: #2563eb;
    color: #fff;
  }

  .stats {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-left: auto;
  }

  .stats strong { color: var(--text-secondary); }

  /* --- GRID --- */
  .grid-container { padding: 1.5rem 2rem 3rem; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 0.5rem;
  }

  .issue-card {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.7rem 0.4rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    color: var(--text-primary);
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 600;
  }

  .issue-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
    color: var(--accent);
  }

  .issue-card.selected {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
  }

  .issue-card.selected::after {
    content: '✓';
    position: absolute;
    top: 2px;
    right: 4px;
    font-size: 0.55rem;
    color: var(--success);
  }

  .issue-card.hidden { display: none; }

  /* --- SELECTION BAR --- */
  .selection-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0.75rem 2rem;
    background: rgba(17, 24, 39, 0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    z-index: 200;
    transform: translateY(100%);
    transition: transform 0.25s ease;
  }

  .selection-bar.visible { transform: translateY(0); }

  .selection-bar .info {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--accent);
  }

  .selection-bar .actions { display: flex; gap: 0.5rem; margin-left: auto; }

  /* --- RANGE SELECTOR MODAL --- */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    width: 340px;
    max-width: 90vw;
  }

  .modal h3 {
    font-family: var(--mono);
    font-size: 0.9rem;
    margin-bottom: 1rem;
    color: var(--text-primary);
  }

  .modal label {
    display: block;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-secondary);
    margin-bottom: 0.25rem;
  }

  .modal input[type="number"] {
    width: 100%;
    padding: 0.5rem;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-primary);
    font-family: var(--mono);
    font-size: 0.8rem;
    margin-bottom: 0.75rem;
    outline: none;
  }

  .modal input[type="number"]:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
    margin-top: 0.5rem;
  }

  /* --- RESPONSIVE --- */
  @media (max-width: 600px) {
    .header, .toolbar, .grid-container { padding-left: 1rem; padding-right: 1rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 0.4rem; }
    .issue-card { font-size: 0.7rem; padding: 0.6rem 0.3rem; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-top">
      <div class="header-badge">EPMS JIRA</div>
    </div>
    <h1><span>DB-</span>Issue Viewer</h1>
    <div class="header-sub">DB-1 through DB-187 &bull; jira.epms.af.mil &bull; Printable HTML Views</div>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="search" placeholder="Jump to issue # or filter...">
    </div>
    <button class="btn" onclick="selectRange()">Select Range</button>
    <button class="btn" onclick="selectAll()">Select All</button>
    <button class="btn" onclick="clearSelection()">Clear</button>
    <button class="btn btn-accent" onclick="openSelected()">Open Selected</button>
    <div class="stats">
      <span id="visibleCount">187</span> shown &middot;
      <strong id="selectedCount">0</strong> selected
    </div>
  </div>

  <div class="grid-container">
    <div class="grid" id="grid"></div>
  </div>

  <div class="selection-bar" id="selectionBar">
    <div class="info"><span id="selBarCount">0</span> issues selected</div>
    <div class="actions">
      <button class="btn" onclick="openSelected()">Open All in Tabs</button>
      <button class="btn" onclick="copyLinks()">Copy Links</button>
      <button class="btn" onclick="clearSelection()">Clear</button>
    </div>
  </div>

  <div class="modal-overlay" id="rangeModal">
    <div class="modal">
      <h3>Select Range</h3>
      <label for="rangeStart">From (DB-)</label>
      <input type="number" id="rangeStart" min="1" max="187" value="1">
      <label for="rangeEnd">To (DB-)</label>
      <input type="number" id="rangeEnd" min="1" max="187" value="187">
      <div class="modal-actions">
        <button class="btn" onclick="closeRangeModal()">Cancel</button>
        <button class="btn btn-accent" onclick="applyRange()">Select</button>
      </div>
    </div>
  </div>

</div>

<script>
const BASE_URL = 'https://jira.epms.af.mil/si/jira.issueviews:issue-html';
const TOTAL = 187;
const selected = new Set();

// Build grid
const grid = document.getElementById('grid');
for (let i = 1; i <= TOTAL; i++) {
  const card = document.createElement('a');
  card.className = 'issue-card';
  card.textContent = `DB-${i}`;
  card.href = `${BASE_URL}/DB-${i}/DB-${i}.html`;
  card.target = '_blank';
  card.rel = 'noopener';
  card.dataset.num = i;

  // Right-click or ctrl+click to select without opening
  card.addEventListener('click', (e) => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      toggleSelect(i, card);
    }
    // Normal click opens the link
  });

  card.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    toggleSelect(i, card);
  });

  grid.appendChild(card);
}

function toggleSelect(num, card) {
  if (selected.has(num)) {
    selected.delete(num);
    card.classList.remove('selected');
  } else {
    selected.add(num);
    card.classList.add('selected');
  }
  updateCounts();
}

function updateCounts() {
  document.getElementById('selectedCount').textContent = selected.size;
  document.getElementById('selBarCount').textContent = selected.size;

  const bar = document.getElementById('selectionBar');
  if (selected.size > 0) {
    bar.classList.add('visible');
  } else {
    bar.classList.remove('visible');
  }
}

function selectAll() {
  const cards = grid.querySelectorAll('.issue-card:not(.hidden)');
  cards.forEach(card => {
    const num = parseInt(card.dataset.num);
    selected.add(num);
    card.classList.add('selected');
  });
  updateCounts();
}

function clearSelection() {
  selected.clear();
  grid.querySelectorAll('.issue-card').forEach(c => c.classList.remove('selected'));
  updateCounts();
}

function selectRange() {
  document.getElementById('rangeModal').classList.add('open');
}

function closeRangeModal() {
  document.getElementById('rangeModal').classList.remove('open');
}

function applyRange() {
  const start = parseInt(document.getElementById('rangeStart').value) || 1;
  const end = parseInt(document.getElementById('rangeEnd').value) || 187;
  const lo = Math.max(1, Math.min(start, end));
  const hi = Math.min(187, Math.max(start, end));

  grid.querySelectorAll('.issue-card').forEach(card => {
    const num = parseInt(card.dataset.num);
    if (num >= lo && num <= hi) {
      selected.add(num);
      card.classList.add('selected');
    }
  });
  updateCounts();
  closeRangeModal();
}

function openSelected() {
  if (selected.size === 0) {
    alert('No issues selected.\n\nClick = open single issue\nCtrl+Click or Right-Click = select multiple');
    return;
  }
  if (selected.size > 20) {
    if (!confirm(`Open ${selected.size} tabs? Your browser might not like that.\n\nConsider using "Copy Links" instead.`)) return;
  }
  const sorted = [...selected].sort((a, b) => a - b);
  sorted.forEach(num => {
    window.open(`${BASE_URL}/DB-${num}/DB-${num}.html`, '_blank');
  });
}

function copyLinks() {
  if (selected.size === 0) return;
  const sorted = [...selected].sort((a, b) => a - b);
  const links = sorted.map(n => `${BASE_URL}/DB-${n}/DB-${n}.html`).join('\n');
  navigator.clipboard.writeText(links).then(() => {
    alert(`${selected.size} links copied to clipboard!`);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = links;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert(`${selected.size} links copied to clipboard!`);
  });
}

// Search / filter
document.getElementById('search').addEventListener('input', (e) => {
  const val = e.target.value.trim().toLowerCase().replace('db-', '');
  const cards = grid.querySelectorAll('.issue-card');
  let visible = 0;

  if (val === '') {
    cards.forEach(c => { c.classList.remove('hidden'); visible++; });
  } else if (/^\d+$/.test(val)) {
    // Number search - show matching
    cards.forEach(card => {
      const num = card.dataset.num;
      if (num.startsWith(val)) {
        card.classList.remove('hidden');
        visible++;
      } else {
        card.classList.add('hidden');
      }
    });
  } else {
    cards.forEach(c => { c.classList.remove('hidden'); visible++; });
  }

  document.getElementById('visibleCount').textContent = visible;
});

// Keyboard shortcut: Escape clears search
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const modal = document.getElementById('rangeModal');
    if (modal.classList.contains('open')) {
      closeRangeModal();
    } else {
      document.getElementById('search').value = '';
      document.getElementById('search').dispatchEvent(new Event('input'));
    }
  }
});
</script>
</body>
</html>
